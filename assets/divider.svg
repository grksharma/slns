<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 24" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="div-brass" gradientUnits="userSpaceOnUse" x1="108" y1="3" x2="132" y2="21">
      <stop offset="0" stop-color="#E9C46A"/>
      <stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
  </defs>
  <!-- gold rule, breaking for the centered kalasham -->
  <path d="M0 13 H98" stroke="#C9A227" stroke-opacity=".35" stroke-width="1"/>
  <path d="M142 13 H240" stroke="#C9A227" stroke-opacity=".35" stroke-width="1"/>
  <!-- kalasham: pot + mango leaves + coconut -->
  <g fill="none" stroke="url(#div-brass)" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
    <!-- pot -->
    <path d="M114.4 11.5 c0 4.6 2.4 6.9 5.6 6.9 c3.2 0 5.6 -2.3 5.6 -6.9"/>
    <!-- rim -->
    <path d="M112.9 11.5 h14.2"/>
    <!-- foot -->
    <path d="M116.6 19.6 h6.8"/>
    <!-- mango leaves, outer pair -->
    <path d="M115.3 10.1 c-2.5 -1.8 -4.3 -2 -5.9 -1"/>
    <path d="M124.7 10.1 c2.5 -1.8 4.3 -2 5.9 -1"/>
    <!-- mango leaves, inner pair -->
    <path d="M117.4 9.5 c-1.4 -2.5 -3 -3.4 -4.8 -3.2"/>
    <path d="M122.6 9.5 c1.4 -2.5 3 -3.4 4.8 -3.2"/>
    <!-- coconut -->
    <circle cx="120" cy="7.4" r="2.5"/>
    <path d="M120 4.9 v-1.5" stroke-width="1"/>
  </g>
</svg>
