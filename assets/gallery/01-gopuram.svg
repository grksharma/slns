<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="g01">
  <title id="g01">Illustration of the temple gopuram silhouetted against the dusk sky</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#241014"/>
      <stop offset=".58" stop-color="#3d151c"/>
      <stop offset="1" stop-color="#6B1F24"/>
    </linearGradient>
    <linearGradient id="brass01" x1="180" y1="120" x2="640" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9C46A"/><stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="glow01" cx="400" cy="470" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B85C24" stop-opacity=".45"/>
      <stop offset="1" stop-color="#B85C24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky)"/>
  <rect width="800" height="600" fill="url(#glow01)"/>
  <!-- stars -->
  <g fill="#E3C363" opacity=".7">
    <circle cx="150" cy="110" r="1.6"/><circle cx="240" cy="80" r="1.1"/>
    <circle cx="620" cy="120" r="1.6"/><circle cx="680" cy="90" r="1.1"/>
    <circle cx="560" cy="70" r="1.3"/><circle cx="110" cy="180" r="1.1"/>
  </g>
  <!-- gopuram silhouette -->
  <g fill="#1c0c10">
    <path d="M300 520 V300 h200 V520 Z"/>
    <path d="M296 300 l24 -34 h160 l24 34 Z"/>
    <path d="M322 266 l18 -30 h120 l18 30 Z"/>
    <path d="M346 236 l14 -26 h80 l14 26 Z"/>
    <path d="M368 210 l12 -24 h40 l12 24 Z"/>
    <path d="M280 520 v-30 h240 v30 Z"/>
  </g>
  <!-- brass engraving of tiers -->
  <g fill="none" stroke="url(#brass01)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M300 520 V300 h200 V520"/>
    <path d="M296 300 l24 -34 h160 l24 34"/>
    <path d="M322 266 l18 -30 h120 l18 30"/>
    <path d="M346 236 l14 -26 h80 l14 26"/>
    <path d="M368 210 l12 -24 h40 l12 24"/>
    <path d="M280 490 h240" stroke-width="1.2"/>
    <!-- niche windows -->
    <path d="M360 300 v-14 h20 v14 M420 300 v-14 h20 v14" stroke-width="1.1" opacity=".85"/>
    <path d="M344 360 h40 v70 h-40 Z" stroke-width="1.1"/>
    <path d="M416 360 h40 v70 h-40 Z" stroke-width="1.1"/>
    <path d="M364 430 v-70 M436 430 v-70" stroke-width=".8" opacity=".7"/>
  </g>
  <!-- five kalashams along the crest -->
  <g fill="none" stroke="url(#brass01)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <g><path d="M388 186 h24"/><path d="M389 186 c0 8 4 12 11 12 c7 0 11 -4 11 -12"/><circle cx="400" cy="176" r="4"/></g>
    <g transform="translate(-58 24)"><path d="M388 186 h24"/><path d="M389 186 c0 8 4 12 11 12 c7 0 11 -4 11 -12"/><circle cx="400" cy="176" r="4"/></g>
    <g transform="translate(58 24)"><path d="M388 186 h24"/><path d="M389 186 c0 8 4 12 11 12 c7 0 11 -4 11 -12"/><circle cx="400" cy="176" r="4"/></g>
  </g>
  <!-- ground line -->
  <path d="M120 520 H680" stroke="url(#brass01)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- frame -->
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="url(#brass01)" stroke-width="2"/>
  <rect x="27" y="27" width="746" height="546" fill="none" stroke="#C9A227" stroke-width="1" opacity=".45"/>
</svg>
