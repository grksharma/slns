<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="g02">
  <title id="g02">Illustration of the sanctum arch (prabhavali) enshrining the sacred flame, awaiting a photograph of the moolavirat</title>
  <defs>
    <linearGradient id="sky02" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#241014"/>
      <stop offset=".6" stop-color="#3d151c"/>
      <stop offset="1" stop-color="#6B1F24"/>
    </linearGradient>
    <linearGradient id="brass02" x1="240" y1="90" x2="560" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9C46A"/><stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="halo02" cx="400" cy="320" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8A13D" stop-opacity=".55"/>
      <stop offset=".6" stop-color="#B85C24" stop-opacity=".18"/>
      <stop offset="1" stop-color="#B85C24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky02)"/>
  <rect width="800" height="600" fill="url(#halo02)"/>
  <!-- prabhavali arch (double stroke, flame ticks, kalasham finial) -->
  <g fill="none" stroke="url(#brass02)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M270 500 C270 250 320 130 400 90 C480 130 530 250 530 500"/>
    <path d="M296 500 C296 262 342 150 400 116 C458 150 504 262 504 500" stroke-width="1.3" opacity=".8"/>
  </g>
  <!-- flame ticks along the arch -->
  <g fill="none" stroke="url(#brass02)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M283 360 q-22 -6 -26 -30"/><path d="M300 250 q-20 -10 -20 -34"/><path d="M336 168 q-16 -16 -12 -40"/>
    <path d="M517 360 q22 -6 26 -30"/><path d="M500 250 q20 -10 20 -34"/><path d="M464 168 q16 -16 12 -40"/>
    <!-- kalasham finial -->
    <path d="M388 84 h24"/><path d="M389 84 c0 9 5 13 11 13 c6 0 11 -4 11 -13"/><circle cx="400" cy="72" r="4.5"/>
  </g>
  <!-- inner pedestal + veiled murti suggestion -->
  <g fill="none" stroke="url(#brass02)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M338 500 v-70 q0 -62 62 -62 q62 0 62 62 v70" opacity=".9"/>
    <path d="M322 500 h156" stroke-width="2"/>
    <path d="M334 470 h132" stroke-width="1.1" opacity=".7"/>
    <path d="M346 500 v-64 M454 500 v-64" stroke-width=".8" opacity=".5"/>
  </g>
  <!-- the jyoti (flame) within — the only saffron fill -->
  <path d="M400 300 C420 340 422 372 400 412 C378 372 380 340 400 300 Z" fill="none" stroke="url(#brass02)" stroke-width="1.5"/>
  <path d="M400 330 C413 356 414 380 400 406 C386 380 387 356 400 330 Z" fill="#E8A13D"/>
  <!-- lamps flanking -->
  <g fill="none" stroke="url(#brass02)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M300 470 h34 q-3 16 -17 16 q-14 0 -17 -16 Z"/><path d="M317 452 q6 8 0 16 q-6 -8 0 -16" fill="#E8A13D" stroke="none"/>
    <path d="M466 470 h34 q-3 16 -17 16 q-14 0 -17 -16 Z"/><path d="M483 452 q6 8 0 16 q-6 -8 0 -16" fill="#E8A13D" stroke="none"/>
  </g>
  <!-- frame -->
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="url(#brass02)" stroke-width="2"/>
  <rect x="27" y="27" width="746" height="546" fill="none" stroke="#C9A227" stroke-width="1" opacity=".45"/>
</svg>
