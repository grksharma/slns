<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="g05">
  <title id="g05">Illustration of a lotus in bloom, the seat of Sri Lakshmi</title>
  <defs>
    <linearGradient id="sky05" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#241014"/><stop offset=".6" stop-color="#3d151c"/><stop offset="1" stop-color="#6B1F24"/>
    </linearGradient>
    <linearGradient id="brass05" x1="240" y1="140" x2="560" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9C46A"/><stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="glow05" cx="400" cy="300" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8A13D" stop-opacity=".32"/><stop offset="1" stop-color="#B85C24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky05)"/>
  <rect width="800" height="600" fill="url(#glow05)"/>
  <g fill="none" stroke="url(#brass05)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <!-- back petals -->
    <path d="M400 300 C332 250 300 180 320 150 C356 176 392 236 400 300 Z" opacity=".7"/>
    <path d="M400 300 C468 250 500 180 480 150 C444 176 408 236 400 300 Z" opacity=".7"/>
    <!-- mid petals -->
    <path d="M400 306 C312 288 258 236 258 196 C312 210 372 250 400 306 Z" opacity=".85"/>
    <path d="M400 306 C488 288 542 236 542 196 C488 210 428 250 400 306 Z" opacity=".85"/>
    <!-- front petals -->
    <path d="M400 320 C296 330 236 300 214 268 C280 262 356 282 400 320 Z"/>
    <path d="M400 320 C504 330 564 300 586 268 C520 262 444 282 400 320 Z"/>
    <!-- centre petal -->
    <path d="M400 316 C376 250 388 190 400 160 C412 190 424 250 400 316 Z"/>
    <!-- pericarp / seed pod -->
    <path d="M370 322 q30 20 60 0 q-4 -22 -30 -22 q-26 0 -30 22 Z"/>
    <g stroke-width="1.1" opacity=".8"><circle cx="386" cy="314" r="2"/><circle cx="400" cy="310" r="2"/><circle cx="414" cy="314" r="2"/><circle cx="393" cy="320" r="2"/><circle cx="407" cy="320" r="2"/></g>
  </g>
  <!-- water line + reflection hints -->
  <g stroke="url(#brass05)" stroke-width="1.2" stroke-linecap="round" opacity=".7">
    <path d="M210 372 H590"/><path d="M300 392 h60 M440 392 h60" opacity=".5"/>
    <!-- pads -->
    <path d="M250 372 a34 12 0 0 0 68 0" fill="none" stroke-width="1.3"/>
    <path d="M482 372 a34 12 0 0 0 68 0" fill="none" stroke-width="1.3"/>
  </g>
  <!-- frame -->
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="url(#brass05)" stroke-width="2"/>
  <rect x="27" y="27" width="746" height="546" fill="none" stroke="#C9A227" stroke-width="1" opacity=".45"/>
</svg>
