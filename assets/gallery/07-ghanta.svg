<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="g07">
  <title id="g07">Illustration of the temple bell (ghanta) rung at the time of aarti</title>
  <defs>
    <linearGradient id="sky07" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#241014"/><stop offset=".6" stop-color="#3d151c"/><stop offset="1" stop-color="#6B1F24"/>
    </linearGradient>
    <linearGradient id="brass07" x1="320" y1="120" x2="480" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9C46A"/><stop offset="1" stop-color="#C9A227"/>
    </linearGradient>
    <radialGradient id="glow07" cx="400" cy="320" r="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8A13D" stop-opacity=".3"/><stop offset="1" stop-color="#B85C24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky07)"/>
  <rect width="800" height="600" fill="url(#glow07)"/>
  <!-- beam -->
  <path d="M250 118 H550" fill="none" stroke="url(#brass07)" stroke-width="3" stroke-linecap="round"/>
  <g fill="none" stroke="url(#brass07)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- suspension chain -->
    <path d="M400 118 v20"/>
    <circle cx="400" cy="146" r="8"/>
    <!-- crown figure (garuda finial) -->
    <path d="M400 154 q-14 6 -14 22 q14 -6 28 0 q0 -16 -14 -22 Z"/>
    <path d="M400 176 v14"/>
    <!-- shoulder -->
    <path d="M360 196 q40 -18 80 0"/>
    <!-- bell body -->
    <path d="M360 196 C336 260 322 330 306 388 q94 30 188 0 C478 330 464 260 440 196"/>
    <!-- decorative bands -->
    <path d="M330 300 q70 24 140 0" stroke-width="1.2" opacity=".85"/>
    <path d="M318 348 q82 26 164 0" stroke-width="1.2" opacity=".85"/>
    <!-- rim & mouth -->
    <path d="M306 388 q94 40 188 0" stroke-width="2.4"/>
    <path d="M300 400 q100 44 200 0" stroke-width="1.2" opacity=".6"/>
    <!-- clapper -->
    <path d="M400 348 v70" stroke-width="1.3"/><circle cx="400" cy="424" r="9"/>
  </g>
  <!-- sound waves -->
  <g fill="none" stroke="url(#brass07)" stroke-width="1.1" stroke-linecap="round" opacity=".55">
    <path d="M250 300 q-22 20 0 40"/><path d="M228 288 q-32 32 0 64"/>
    <path d="M550 300 q22 20 0 40"/><path d="M572 288 q32 32 0 64"/>
  </g>
  <!-- frame -->
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="url(#brass07)" stroke-width="2"/>
  <rect x="27" y="27" width="746" height="546" fill="none" stroke="#C9A227" stroke-width="1" opacity=".45"/>
</svg>
